name: Ada (SPARK Verification con Alire)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Alire & GNAT
      uses: alire-project/setup-alire@v3
      with:
        cache: true

    - name: Verify SPARK Code
      run: alr build --validation
